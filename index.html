<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background-color: #ffdfd6;
            padding: 20px;
            text-align: center;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #6a5acd;
            font-weight: bold;
        }
        nav a:hover {
            color: #ff69b4;
        }
        .content {
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #ffdfd6;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .flower {
            width: 50px;
            position: absolute;
            z-index: -1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Love Story</h1>
        <nav>
            <a href="#birthday">Birthday</a>
            <a href="#trips">Our Trips</a>
            <a href="#wedding">Wedding Photos</a>
            <a href="#random">Random Photos</a>
            <a href="#timeline">Timeline</a>
        </nav>
    </header>
    <div class="content">
        <h2>Happy Birthday Vijeta!</h2>
        <p>This is your special place where we celebrate our love and beautiful memories together.</p>
        <img src="path_to_flower_decor.png" alt="Flower Decoration" class="flower">
    </div>
    <footer>
        <p>Made with love for Vijeta ❤️</p>
    </footer>
</body>
</html>
